<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Prediction Result</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
    <h1 class="text-center mb-4">Prediction Result</h1>

    <div class="card p-4 shadow-sm">
        <ul class="list-group">
            <li class="list-group-item"><strong>Student:</strong> {{ performance.student.name }}</li>
            <li class="list-group-item"><strong>G1:</strong> {{ performance.G1 }}</li>
            <li class="list-group-item"><strong>G2:</strong> {{ performance.G2 }}</li>
            <li class="list-group-item"><strong>Predicted G3:</strong> {{ performance.predicted_G3 }}</li>
            <li class="list-group-item"><strong>Risk Level:</strong> {{ performance.risk_level }}</li>
            <li class="list-group-item"><strong>Recommendation:</strong> {{ performance.recommendation }}</li>
        </ul>
        <a href="{% url 'predict' %}" class="btn btn-secondary mt-3 w-100">Predict Again</a>
    </div>
</div>
</body>
</html>
