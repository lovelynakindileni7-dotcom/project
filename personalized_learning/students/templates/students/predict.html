<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Predict Performance</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
    <h1 class="text-center mb-4">Enter Your Scores</h1>

    <div class="card p-4 shadow-sm">
        <form method="POST">
            {% csrf_token %}
            {% load widget_tweaks %}
            <div class="mb-3">
                {{ form.G1.label_tag }} 
                {{ form.G1|add_class:"form-control" }}
            </div>
            <div class="mb-3">
                {{ form.G2.label_tag }} 
                {{ form.G2|add_class:"form-control" }}
            </div>
            <button type="submit" class="btn btn-primary w-100">Predict</button>
        </form>
        {% if prediction %}
        <h2>Predicted Final Grade (G3): {{ prediction }}</h2>
        <h3>Risk Level: {{ risk }}</h3>
        {% endif %}
    </div>
</div>

</body>
</html>
